<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificador de Rutas de Camiones</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ffffff 0%, #f0f8ff 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #1565c0;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #424242;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .section {
            border: none;
            border-radius: 15px;
            padding: 25px;
            margin-top: 25px;
            background: #e3f2fd;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .section:hover {
            transform: translateY(-2px);
        }

        .hidden {
            display: none;
        }

        button {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin: 8px;
            border-radius: 25px;
            border: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        button:hover:before {
            left: 100%;
        }

        #start-camera-btn {
            background: linear-gradient(45deg, #1976d2, #0d47a1);
            color: white;
            box-shadow: 0 4px 15px rgba(25, 118, 210, 0.3);
        }

        #start-camera-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(25, 118, 210, 0.4);
        }

        #capture-btn {
            background: linear-gradient(45deg, #2196f3, #1565c0);
            color: white;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }

        #capture-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }

        #restart-btn {
            background: linear-gradient(45deg, #42a5f5, #1e88e5);
            color: white;
            box-shadow: 0 4px 15px rgba(66, 165, 245, 0.3);
        }

        #restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(66, 165, 245, 0.4);
        }

        select {
            padding: 12px;
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #1976d2;
        }

        /* ── Contenedor de cámara ── */
        #webcam-container {
            margin: 20px auto;
            border: 4px solid #1976d2;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            background: #f8f9fa;
            position: relative;
        }

        /* El video ocupa todo el contenedor */
        #webcam {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 10px;
            object-fit: cover;
        }

        /* El canvas está oculto — solo lo usa el modelo para predecir */
        #canvas {
            display: none;
        }

        .camera-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        #result {
            font-size: 1.3em;
            font-weight: 600;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }

        .correct {
            color: #28a745;
            background: rgba(40, 167, 69, 0.1);
            border: 2px solid #28a745;
        }

        .incorrect {
            color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
            border: 2px solid #dc3545;
        }

        .icon {
            margin-right: 8px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 20px;
            }

            button {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1><i class="fas fa-truck icon"></i>Identificador de Rutas de Camiones</h1>
        <p class="subtitle">Descubre si tu camión va a tu destino usando IA</p>

        <!-- Sección 1: Selección de Destino -->
        <div class="section destination-section">
            <h2><i class="fas fa-map-marker-alt icon"></i>¿Cuál es tu destino?</h2>
            <p>Selecciona tu destino de la lista y luego apunta la cámara al camión.</p>
            <select id="destination-select">
                <option value="" disabled selected>-- Selecciona un destino --</option>
            </select>
            <br><br>
            <button id="start-camera-btn"><i class="fas fa-camera icon"></i>Iniciar Cámara</button>
        </div>

        <!-- Sección 2: Vista de Cámara (oculta por defecto) -->
        <div class="section camera-section hidden">
            <h2><i class="fas fa-video icon"></i>Apunta la cámara al camión</h2>

            <!-- ✅ CAMBIO CLAVE: video visible + canvas oculto para el modelo -->
            <div id="webcam-container">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="canvas"></canvas>
            </div>

            <div class="camera-controls">
                <button id="capture-btn" class="hidden">
                    <i class="fas fa-search icon"></i>Identificar Camión
                </button>
            </div>
        </div>

        <!-- Sección 3: Resultado (oculta por defecto) -->
        <div class="section result-section hidden">
            <h2><i class="fas fa-check-circle icon"></i>Resultado</h2>
            <div id="result"></div>
            <br>
            <button id="restart-btn"><i class="fas fa-redo icon"></i>Comenzar de Nuevo</button>
        </div>
    </div>

    <!-- Scripts de Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>

</html>
